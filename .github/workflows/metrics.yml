name: Metrics
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          # ponytail: lowercase login — metrics v3.34 filters.text lowercases the
          # value but not the pattern, so a mixed-case user drops every event
          user: giuseppecastro
          commits_authoring: giuseppecastro, peppepretto@gmail.com, giuseppe pretto
          base: ""
          config_timezone: America/Sao_Paulo
          plugin_languages: yes
          plugin_languages_sections: recently-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_recent_days: 14
