name: Metrics
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          # ponytail: lowercase login — metrics v3.34 filters.text lowercases the
          # value but not the pattern, so a mixed-case user drops every event.
          # Section is most-used, not recently-used: GitHub removed `commits`
          # from PushEvent payloads, which broke metrics' recently-used upstream.
          user: giuseppecastro
          base: ""
          config_timezone: America/Sao_Paulo
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
